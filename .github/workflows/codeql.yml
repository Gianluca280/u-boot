name: "CodeQL"

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: c-cpp

    - name: Build U-Boot
      run: |
        sudo apt-get update
        sudo apt-get install -y libsdl2-dev build-essential device-tree-compiler bison flex
        
        # Configurazione sandbox
        make sandbox_defconfig
        
        # COMPILAZIONE: Aggiungiamo HOSTCFLAGS="-fcommon" per risolvere l'errore yylloc
        make -j$(nproc) HOSTCFLAGS="-fcommon" NO_SDL=1

        # Configurazione sandbox e compilazione forzata senza SDL
        make sandbox_defconfig
        make -j$(nproc) NO_SDL=1
        
        # Pulizia e configurazione
        make distclean
        make sandbox_defconfig
        
        # Compilazione (usiamo NO_SDL=1 se SDL dovesse dare problemi nel cloud)
        make -j$(nproc) NO_SDL=1

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        queries: ./.github/codeql/queries/taint_analysis.ql
