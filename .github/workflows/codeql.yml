name: "CodeQL"

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: c-cpp
        # Forza il caricamento solo della tua query
        queries: ./.github/codeql/queries/taint_analysis.ql
        # Impedisce a GitHub di aggiungere le sue query standard
        config: |
          disable-default-queries: true

    - name: Build U-Boot
      run: |
        sudo apt-get update
        sudo apt-get install -y libsdl2-dev build-essential device-tree-compiler bison flex libssl-dev
        make distclean
        make sandbox_defconfig
        export HOSTCFLAGS="-fcommon"
        export KBUILD_HOSTCFLAGS="-fcommon"
        make -j$(nproc) HOSTCFLAGS="$HOSTCFLAGS" KBUILD_HOSTCFLAGS="$KBUILD_HOSTCFLAGS" NO_SDL=1

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:c-cpp"
        # Qui lasciamo pulito per evitare il warning giallo
